name: DNS + Fake-IP 2026 终极稳定版
desc: 零泄漏 + 抗污染 + 高稳定 | 配合 TUN 模式 | 已优化 Stash/Clash Meta

dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  use-system-hosts: false
  use-hosts: true
  cache-algorithm: arc
  prefer-h3: false
  respect-rules: false

  # DNS 劫持（关键修复）
  dns-hijack:
    - 'tcp://0.0.0.0:53'
    - 'udp://0.0.0.0:53'
    - 'tcp://0.0.0.0:853'
    - 'udp://0.0.0.0:853'

  # Fake-IP 设置
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - '*.local'
    - '*.lan'
    - 'localhost.*'
    - '*.stun.*.*'
    - '+.msftncsi.com'
    - '+.msftconnecttest.com'
    - '+.ptlogin2.qq.com'
    - '+.id.qq.com'
    - '+.weixin.qq.com'
    - 'api.mixpanel.com'
    - '*.doubleclick.net'
    - '*.google-analytics.com'

  # 引导 DNS（纯 IP）
  default-nameserver:
    - 223.5.5.5
    - 223.6.6.6
    - 119.29.29.29

  # 主 nameserver
  nameserver:
    - https://dns.alidns.com/dns-query#DIRECT
    - https://doh.pub/dns-query#DIRECT
    - https://dns.google/dns-query#PROXY
    - https://cloudflare-dns.com/dns-query#PROXY

  # 兜底 DNS
  fallback:
    - https://cloudflare-dns.com/dns-query#PROXY
    - https://9.9.9.9/dns-query#PROXY
    - tls://1.1.1.1:853#PROXY

  # 节点域名解析保护
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query#DIRECT

  # Fallback 过滤
  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
      - gfw
      - google
      - youtube
      - telegram

  # 精准 DNS 策略
  nameserver-policy:
    # 国内直连
    'geosite:cn,private': https://dns.alidns.com/dns-query#DIRECT
    'geosite:apple,icloud': https://dns.alidns.com/dns-query#DIRECT

    '+.baidu.com,+.taobao.com,+.jd.com,+.pinduoduo.com,+.douyin.com,+.alipay.com,+.qq.com,+.wx.qq.com,+.mmstat.com,+.xiaohongshu.com,+.weibo.com,+.zhihu.com': https://dns.alidns.com/dns-query#DIRECT

    # 国外敏感服务走代理 DNS
    'geosite:google,youtube,telegram,netflix,disney,spotify,facebook,twitter,github': https://dns.google/dns-query#PROXY

    # 非中国区域走代理 DNS
    'geosite:geolocation-!cn': https://dns.google/dns-query#PROXY

    # 追踪域名走安全 DNS
    '+.analytics.google.com,+.doubleclick.net,+.mixpanel.com': https://9.9.9.9/dns-query#PROXY
