  # 携程 / 旅行系
  - DOMAIN-SUFFIX,ctrip.com,DIRECT
  - DOMAIN-SUFFIX,ctriptravel.com,DIRECT
  - DOMAIN-SUFFIX,fliggy.com,DIRECT
