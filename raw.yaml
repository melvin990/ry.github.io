  - DOMAIN-SUFFIX,biliapi.net,DIRECT
  - DOMAIN-SUFFIX,hdslb.com,DIRECT
  # 其他常用国内 App
  - DOMAIN-SUFFIX,zhihu.com,DIRECT
  - DOMAIN-SUFFIX,58.com,DIRECT
  - DOMAIN-SUFFIX,ganji.com,DIRECT
  - DOMAIN-SUFFIX,autohome.com.cn,DIRECT
  - DOMAIN-SUFFIX,maoyan.com,DIRECT
  - DOMAIN-SUFFIX,didiglobal.com,DIRECT          # 滴滴
  - DOMAIN-SUFFIX,baidu.com,DIRECT
  - DOMAIN-SUFFIX,baidustatic.com,DIRECT
  - DOMAIN-SUFFIX,bdstatic.com,DIRECT
  
  - DOMAIN,clash.razord.top,DIRECT
  - DOMAIN,yacd.haishan.me,DIRECT
  - RULE-SET,reject,REJECT
  - RULE-SET,private,DIRECT,no-resolve
  - RULE-SET,icloud,DIRECT
  - RULE-SET,apple,DIRECT
  - RULE-SET,direct,DIRECT
  - GEOIP,CN,DIRECT,no-resolve
  - RULE-SET,cncidr,DIRECT,no-resolve
  - RULE-SET,lancidr,DIRECT,no-resolve
  - RULE-SET,telegramcidr,XSUS,no-resolve   # telegramcidr 是 IP 规则，加 no-resolve
  - RULE-SET,google,XSUS
  - RULE-SET,proxy,XSUS
  - MATCH,XSUS                              # 必须加兜底，走你的代理组（XSUS）
