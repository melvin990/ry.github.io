name: clash-rules
desc: clash-rules 规则集覆写

rule-providers:
  reject:
    behavior: domain
    format: yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt
    interval: 86400
  icloud:
    behavior: domain
    format: yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/icloud.txt
    interval: 86400
  apple:
    behavior: domain
    format: yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/apple.txt
    interval: 86400
  google:
    behavior: domain
    format: yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/google.txt
    interval: 86400
  proxy:
    behavior: domain
    format: yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt
    interval: 86400
  direct:
    behavior: domain
    format: yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt
    interval: 86400
  private:
    behavior: domain
    format: yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/private.txt
    interval: 86400
  gfw:
    behavior: domain
    format: yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/gfw.txt
    interval: 86400
  greatfire:
    behavior: domain
    format: yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/greatfire.txt
    interval: 86400
  tld-not-cn:
    behavior: domain
    format: yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/tld-not-cn.txt
    interval: 86400
  telegramcidr:
    behavior: ipcidr
    format: yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/telegramcidr.txt
    interval: 86400
  cncidr:
    behavior: ipcidr
    format: yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/cncidr.txt
    interval: 86400
  lancidr:
    behavior: ipcidr
    format: yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/lancidr.txt
    interval: 86400
rules:
  # ==================== 金融与运营商 App 强制直连（最高优先级）===================
  # 中国联通
  - DOMAIN-SUFFIX,10010.com,DIRECT
  - DOMAIN-SUFFIX,chinaunicom.com,DIRECT
  - DOMAIN-SUFFIX,unicom.com,DIRECT
  - DOMAIN-SUFFIX,wo.com.cn,DIRECT
  - DOMAIN-SUFFIX,unicomgd.com,DIRECT
  - DOMAIN-KEYWORD,10010,DIRECT
  # 中国农业银行 (ABC)
  - DOMAIN-SUFFIX,abchina.com,DIRECT
  - DOMAIN-SUFFIX,95599.com,DIRECT
  - DOMAIN-SUFFIX,abcbank.com,DIRECT
  - DOMAIN-SUFFIX,abchina.net,DIRECT
  # 招商银行 (CMB)
  - DOMAIN-SUFFIX,cmbchina.com,DIRECT
  - DOMAIN-SUFFIX,95555.com,DIRECT
  - DOMAIN-SUFFIX,cmb.com,DIRECT
  - DOMAIN-SUFFIX,cmbc.com.cn,DIRECT
  # 光大银行 (CEB)
  - DOMAIN-SUFFIX,cebbank.com,DIRECT
  - DOMAIN-SUFFIX,95595.com,DIRECT
  - DOMAIN-SUFFIX,cebbank.net,DIRECT
  # 中国建设银行 (CCB)
  - DOMAIN-SUFFIX,ccb.com,DIRECT
  - DOMAIN-SUFFIX,95533.com,DIRECT
  - DOMAIN-SUFFIX,ccbank.com,DIRECT
  - DOMAIN-SUFFIX,ccb.net,DIRECT
