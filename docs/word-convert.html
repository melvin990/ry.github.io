<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>繁簡中文轉換器</title>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.3.0/dist/umd/full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC&display=swap');
        
        :root { --primary: #2563eb; }
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body {
            font-family: 'Noto Sans TC', system-ui, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1280px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        
        header { 
            background: linear-gradient(135deg, var(--primary), #1d4ed8);
            color: white; 
            padding: 2.2rem 2rem; 
            text-align: center; 
        }
        
        .tabs { display: flex; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
        .tab {
            padding: 1.1rem 2rem;
            cursor: pointer;
            font-weight: 500;
            flex: 1;
            text-align: center;
        }
        .tab.active {
            background: white;
            border-bottom: 4px solid var(--primary);
            color: var(--primary);
        }
        
        .content { padding: 2.5rem; }
        .panel {
            background: #f8fafc;
            border-radius: 16px;
            padding: 1.8rem;
            border: 1px solid #e2e8f0;
        }
        
        textarea {
            width: 100%;
            min-height: 380px;
            padding: 1.3rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1.05rem;
            font-family: monospace;
            line-height: 1.75;
        }
        
        .result {
            width: 100%;
            min-height: 380px;
            padding: 1.3rem;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            white-space: pre-wrap;
            font-family: 'Noto Serif TC', serif;
            font-size: 1.05rem;
            line-height: 1.8;
            overflow-y: auto;
        }
        
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 1.2rem;
        }
        
        button {
            padding: 13px 26px;
            border: none;
            border-radius: 50px;
            font-size: 1.02rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #1d4ed8; transform: translateY(-2px); }
        .btn-secondary { background: white; color: #475569; border: 2px solid #cbd5e1; }
        .btn-secondary:hover { background: #f1f5f9; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>繁簡中文轉換器</h1>
        </header>

        <div class="tabs">
            <div class="tab active" data-tab="text">文字模式</div>
            <div class="tab" data-tab="html">HTML頁面模式</div>
        </div>

        <!-- ==================== 文字模式 ==================== -->
        <div id="textPanel" class="content">
            <div style="display:flex; gap:24px; flex-wrap:wrap;">
                <div style="flex:1; min-width:320px;">
                    <div class="panel">
                        <h3>輸入文字</h3>
                        <textarea id="inputText" placeholder="在此輸入要轉換的文字..."></textarea>
                    </div>
                </div>
                <div style="flex:1; min-width:320px;">
                    <div class="panel">
                        <h3>轉換結果</h3>
                        <div id="resultText" class="result"></div>
                        <div class="btn-group">
                            <button class="btn-secondary" id="copyTextResult">📋 複製結果</button>
                            <button class="btn-secondary" id="clearTextResult">🗑️ 清除結果</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="btn-group" style="margin-top: 2rem;">
                <button class="btn-primary" id="toSimplified">🔄 轉為簡體中文</button>
                <button class="btn-primary" id="toTraditional">🔄 轉為繁體中文</button>
            </div>
        </div>

        <!-- ==================== HTML模式 ==================== -->
        <div id="htmlPanel" class="content" style="display:none;">
            <div style="display:flex; gap:24px; flex-wrap:wrap;">
                <div style="flex:1; min-width:320px;">
                    <div class="panel">
                        <h3>輸入 HTML 原始碼</h3>
                        <textarea id="htmlInput" placeholder="貼上完整的 HTML 程式碼..."></textarea>
                        <div class="btn-group">
                            <button class="btn-primary" id="parseAndConvertT2S">🔄 轉為簡體</button>
                            <button class="btn-primary" id="parseAndConvertS2T">🔄 轉為繁體</button>
                            <button class="btn-secondary" id="clearAllHTML">🗑️ 清空全部</button>
                        </div>
                    </div>
                </div>
                
                <div style="flex:1; min-width:320px;">
                    <div class="panel">
                        <h3>轉換後結果</h3>
                        <div id="htmlResult" class="result"></div>
                        <div class="btn-group">
                            <button class="btn-secondary" id="copyHTMLResult">📋 複製HTML</button>
                            <button class="btn-primary" id="downloadHTML">⬇️ 下載HTML檔案</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let converterT2S = null;
        let converterS2T = null;
        let currentHTMLResult = '';

        async function initConverters() {
            converterT2S = OpenCC.Converter({ from: 'tw', to: 'cn' });
            converterS2T = OpenCC.Converter({ from: 'cn', to: 'tw' });
        }

        function safeConvert(text, converter) {
            if (!text || !converter) return text;
            try {
                return converter(text);
            } catch (e) {
                return text.split('').map(char => {
                    try { return converter(char); } catch { return char; }
                }).join('');
            }
        }

        function convertHTML(htmlString, converter) {
            let processed = htmlString.replace(/<br\s*\/?>/gi, '[[BR_TAG]]');
            
            const parser = new DOMParser();
            const doc = parser.parseFromString(processed, 'text/html');
            
            function traverse(node) {
                if (node.nodeType === Node.TEXT_NODE) {
                    if (node.nodeValue && node.nodeValue.trim()) {
                        node.nodeValue = safeConvert(node.nodeValue, converter);
                    }
                } else if (node.nodeType === Node.ELEMENT_NODE) {
                    if (['SCRIPT', 'STYLE', 'CODE', 'PRE', 'TEXTAREA'].includes(node.tagName)) return;
                    Array.from(node.childNodes).forEach(traverse);
                }
            }
            
            traverse(doc.body || doc.documentElement);
            
            let result = new XMLSerializer().serializeToString(doc);
            result = result.replace(/\[\[BR_TAG\]\]/g, '<br>');
            result = result.replace(/<br\s*\/>/gi, '<br>');
            return result;
        }

        function copyToClipboard(text, btn) {
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                const original = btn.text();
                btn.text('✅ 已複製！');
                setTimeout(() => btn.text(original), 1800);
            });
        }

        $(document).ready(function() {
            initConverters();

            // Tab 切換
            $('.tab').on('click', function() {
                $('.tab').removeClass('active');
                $(this).addClass('active');
                $('#textPanel').toggle($(this).data('tab') === 'text');
                $('#htmlPanel').toggle($(this).data('tab') === 'html');
            });

            // ==================== 文字模式 ====================
            $('#toSimplified').click(() => {
                const text = $('#inputText').val();
                if (text) $('#resultText').text(safeConvert(text, converterT2S));
            });

            $('#toTraditional').click(() => {
                const text = $('#inputText').val();
                if (text) $('#resultText').text(safeConvert(text, converterS2T));
            });

            $('#copyTextResult').click(() => copyToClipboard($('#resultText').text(), $('#copyTextResult')));
            /*$('#clearTextResult').click(() => $('#resultText').text(''));*/
            $('#clearTextResult').click(() => {
                 $('#inputText').val('');
                 $('#resultText').text('');
             });

            // ==================== HTML模式 ====================
            $('#parseAndConvertT2S').click(() => {
                const html = $('#htmlInput').val().trim();
                if (!html) return alert('請輸入HTML內容');
                currentHTMLResult = convertHTML(html, converterT2S);
                $('#htmlResult').text(currentHTMLResult);
            });

            $('#parseAndConvertS2T').click(() => {
                const html = $('#htmlInput').val().trim();
                if (!html) return alert('請輸入HTML內容');
                currentHTMLResult = convertHTML(html, converterS2T);
                $('#htmlResult').text(currentHTMLResult);
            });

            $('#copyHTMLResult').click(() => copyToClipboard(currentHTMLResult, $('#copyHTMLResult')));
            
            $('#clearAllHTML').click(() => {
                $('#htmlInput').val('');
                $('#htmlResult').text('');
                currentHTMLResult = '';
            });

            $('#downloadHTML').click(() => {
                if (!currentHTMLResult) return alert('請先進行轉換');
                const blob = new Blob([currentHTMLResult], { type: 'text/html' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `converted_${new Date().toISOString().slice(0,10)}.html`;
                a.click();
            });
        });
    </script>
</body>
</html>
