<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章 · 小说转HTML工具</title>
    <style>
        :root {
            --primary: #8b4513;
            --accent: #c19a6b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: "Microsoft YaHei", "Songti SC", serif;
            background: linear-gradient(135deg, #f9f6f0, #e8e0d4);
            color: #2c2c2c;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 70px rgba(139, 69, 19, 0.18);
            overflow: hidden;
            height: calc(100vh - 40px);
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(90deg, #8b4513, #c19a6b);
            color: white;
            padding: 18px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        header h1 {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .nav-tools button {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-left: 10px;
            transition: all 0.3s;
        }
        .nav-tools button:hover { transform: translateY(-2px); }

        .btn-primary { background: #8b4513; color: white; }
        .btn-secondary { background: #f4ede3; color: #8b4513; }
        .btn-success { background: #2e8b57; color: white; }

        .main-content {
            flex: 1;
            display: flex;
            min-height: 0;           /* 关键：允许子元素滚动 */
            overflow: hidden;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 28px;
            overflow: hidden;
        }

        .panel h3 {
            margin-bottom: 14px;
            font-size: 18px;
            color: #8b4513;
            font-weight: 600;
            flex-shrink: 0;
        }

        textarea {
            flex: 1;
            padding: 24px;
            border: 2px solid #e8e0d4;
            border-radius: 12px;
            font-size: 16.8px;
            line-height: 1.92;
            resize: none;
            font-family: inherit;
            overflow-y: auto;
            min-height: 200px;
        }

        .preview {
            flex: 1;
            background: #fdfaf4;
            border: 2px solid #e8e0d4;
            border-radius: 12px;
            padding: 48px 42px;
            overflow-y: auto;           /* 独立滚动 */
            line-height: 2.0;
            font-size: 17.4px;
            box-shadow: inset 0 4px 20px rgba(0,0,0,0.04);
            min-height: 200px;
        }

        /* 小说排版样式 */
        .preview h2 {
            color: #8b4513;
            text-align: center;
            font-size: 1.85em;
            margin: 2.8em 0 1.6em;
            border-bottom: 3px double #c19a6b;
            padding-bottom: 14px;
        }
        .preview h3 {
            text-align: center;
            font-style: italic;
            color: #555;
            margin: 2.4em 0 1.4em;
        }
        .preview p {
            text-indent: 2.4em;
            margin: 1.45em 0;
            text-align: justify;
        }
        .preview blockquote {
            background: #f5f0e6;
            border-left: 8px solid #c19a6b;
            margin: 2.8em 2.5em;
            padding: 26px 34px;
            color: #444;
        }
        .preview .chapter-end {
            text-align: center;
            color: #8b4513;
            margin: 3.5em 0 2em;
            font-weight: bold;
        }

        .status {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>文章 · 小说转HTML工具</h1>
            <div class="nav-tools">
                <button onclick="convertToHTML()" class="btn-primary">🚀 转换为HTML</button>
                <button onclick="exportFullHTML()" class="btn-secondary">📄 导出完整HTML</button>
                <!-- <button onclick="exportPDF()" class="btn-success">📕 导出PDF</button> -->
                <button onclick="clearAll()" class="btn-secondary">清空</button>
            </div>
        </header>

        <div class="main-content">
            <!-- 输入面板 -->
            <div class="panel">
                <h3>① 粘贴原文</h3>
                <textarea id="input" placeholder="把文章或小说文字粘贴在这里..."></textarea>
                <div class="status">提示：按 Ctrl + Enter 可快速转换</div>
            </div>

            <!-- 预览面板 -->
            <div class="panel">
                <h3>② 实时小说排版预览</h3>
                <div id="preview" class="preview"></div>
            </div>
        </div>

        <!-- 输出代码区 -->
        <div style="padding: 16px 32px; background: #f9f6f0; border-top: 1px solid #e8e0d4; flex-shrink: 0;">
            <h3 style="margin-bottom: 8px; color: #8b4513;">③ 生成的HTML代码</h3>
            <textarea id="outputHTML" readonly style="width:100%; height: 140px; font-family: Consolas, monospace; font-size: 14.5px; background:#f4ede3; border: 2px solid #e8e0d4; border-radius: 10px;"></textarea>
        </div>
    </div>

    <script>
        // ==================== 核心转换函数（保持之前优化逻辑） ====================
        function escapeHTML(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                      .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        function isChapterTitle(line) {
            return /^(第[一二三四五六七八九十百千0-9]+[回章卷节])|第\s*\d+[回章]/.test(line) ||
                   (line.includes('第') && line.includes('回') && line.length < 85);
        }

        function isLikelyPoem(line) {
            const t = line.trim();
            if (t.length > 68) return false;
            if (/^(却说|看官|原来|且说|话说|这且不说|按|士隐|雨村)/.test(t)) return false;
            if (/吟罢|云：|言词道：|说道：|笑道：/.test(t)) return false;
            const punct = (t.match(/[，。？！；、：“”‘’（）]/g) || []).length;
            return punct >= 3 || /诗云|偈云|好了歌|对联/.test(t);
        }

        function convertToHTML() {
            const text = document.getElementById('input').value.trim();
            if (!text) return alert('请粘贴小说内容！');

            const lines = text.split(/\r?\n/);
            let html = '';
            let i = 0;

            while (i < lines.length) {
                let line = lines[i].trim();
                if (!line) { i++; continue; }

                if (isChapterTitle(line)) {
                    html += `<h2>${escapeHTML(line)}</h2>\n`;
                    i++;
                    if (i < lines.length) {
                        let next = lines[i].trim();
                        if (next && !isChapterTitle(next) && next.length < 100) {
                            html += `<h3>${escapeHTML(next)}</h3>\n`;
                            i++;
                        }
                    }
                    continue;
                }

                if (isLikelyPoem(line)) {
                    let poem = escapeHTML(line);
                    let count = 1;
                    i++;
                    while (i < lines.length) {
                        let next = lines[i].trim();
                        if (!next || isChapterTitle(next) || next.length > 75) break;
                        if (isLikelyPoem(next)) {
                            poem += '<br>' + escapeHTML(next);
                            count++;
                            i++;
                        } else break;
                    }
                    html += (count >= 2 || poem.includes('好了歌')) 
                        ? `<blockquote>${poem}</blockquote>\n` 
                        : `<p>${poem}</p>\n`;
                    continue;
                }

                if (/^(却说|看官|原来|且说|话说)/.test(line)) {
                    html += `<p><strong>${escapeHTML(line)}</strong></p>\n`;
                    i++;
                    continue;
                }

                let paragraph = line;
                i++;
                while (i < lines.length) {
                    let next = lines[i].trim();
                    if (!next) { i++; continue; }
                    if (isChapterTitle(next) || isLikelyPoem(next)) break;
                    if (/^(却说|看官|原来|且说|话说)/.test(next)) break;

                    if ((/[。！？]$/.test(paragraph) || /[。！？]$/.test(next)) && 
                        (paragraph.length > 90 || next.length > 90)) break;

                    paragraph += ' ' + next;
                    i++;
                }
                html += `<p>${escapeHTML(paragraph)}</p>\n`;
            }

            if (text.includes('本章完') || text.includes('(本章完)')) {
                html += '<div class="chapter-end">（本章完）</div>';
            }

            document.getElementById('preview').innerHTML = html;
            document.getElementById('outputHTML').value = html.trim();
        }

        // 导出完整HTML
        function exportFullHTML() {
            const content = document.getElementById('preview').innerHTML;
            if (!content) return alert('请先转换内容！');
            
            const full = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>小说、文章 - 电子阅读版</title>
<style>
    body { font-family: "Songti SC", serif; background:#f9f6f0; padding:60px 80px; line-height:2.05; font-size:17.8px; max-width:820px; margin:40px auto; }
    h2 { text-align:center; color:#8b4513; border-bottom:3px double #c19a6b; padding-bottom:16px; margin:70px 0 35px; }
    h3 { text-align:center; font-style:italic; color:#555; margin:55px 0 30px; }
    p { text-indent:2.5em; margin:1.6em 0; text-align:justify; }
    blockquote { background:#f5f0e6; border-left:8px solid #c19a6b; margin:45px 35px; padding:32px 38px; }
    .chapter-end { text-align:center; color:#8b4513; margin:90px 0 50px; font-weight:bold; }
</style>
</head>
<body>${content}</body>
</html>`;

            const blob = new Blob([full], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = '小说、文章_章节.html';
            a.click();
        }

        // 导出PDF
        function exportPDF() {
            if (!document.getElementById('preview').innerHTML) 
                return alert('请先转换内容！');
            window.print();
        }

        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('preview').innerHTML = '';
            document.getElementById('outputHTML').value = '';
        }

        // 快捷键
        document.getElementById('input').addEventListener('keydown', e => {
            if (e.ctrlKey && e.key === 'Enter') convertToHTML();
        });
    </script>
</body>
</html>
