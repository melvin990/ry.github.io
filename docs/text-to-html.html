<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小说转HTML · 优雅排版工具</title>
    <style>
        :root {
            --primary: #8b5a2b;
            --accent: #d4a373;
            --bg: #f8f4ed;
            --panel: #ffffff;
        }
        
        [data-theme="dark"] {
            --primary: #c19a6b;
            --accent: #e8c9a0;
            --bg: #1a1814;
            --panel: #25221c;
            color: #e8e0d4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: "Microsoft YaHei", "Songti SC", "Noto Serif SC", serif;
            background: var(--bg);
            color: #2c2c2c;
            padding: 16px;
            min-height: 100vh;
            transition: background 0.4s;
        }

        .container {
            max-width: 1380px;
            margin: 0 auto;
            background: var(--panel);
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(139, 90, 43, 0.15);
            overflow: hidden;
            height: calc(100vh - 32px);
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(90deg, var(--primary), var(--accent));
            color: white;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        header h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover { transform: translateY(-2px); }
        .btn-primary { background: #8b5a2b; color: white; }
        .btn-secondary { background: rgba(255,255,255,0.25); color: white; }
        .btn-success { background: #2e8b57; color: white; }

        .main-content {
            flex: 1;
            display: flex;
            min-height: 0;
            overflow: hidden;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px;
            overflow: hidden;
        }

        .panel h3 {
            margin-bottom: 12px;
            font-size: 17px;
            color: var(--primary);
            font-weight: 600;
            flex-shrink: 0;
        }

        textarea {
            flex: 1;
            padding: 20px;
            border: 2px solid #e8d9c0;
            border-radius: 16px;
            font-size: 16.5px;
            line-height: 1.95;
            resize: none;
            font-family: inherit;
            overflow-y: auto;
            background: #fdfaf4;
            transition: all 0.3s;
        }

        [data-theme="dark"] textarea {
            background: #2c2820;
            border-color: #4a4235;
        }

        .preview {
            flex: 1;
            background: #fdfaf4;
            border: 2px solid #e8d9c0;
            border-radius: 16px;
            padding: 50px 48px;
            overflow-y: auto;
            line-height: 2.05;
            font-size: 17.8px;
            box-shadow: inset 0 4px 25px rgba(0,0,0,0.03);
        }

        [data-theme="dark"] .preview {
            background: #2c2820;
            border-color: #4a4235;
            color: #e8e0d4;
        }

        /* 小说排版样式 */
        .preview h2 {
            color: var(--primary);
            text-align: center;
            font-size: 1.92em;
            margin: 3em 0 1.8em;
            border-bottom: 3px double var(--accent);
            padding-bottom: 18px;
        }

        .preview h3 {
            text-align: center;
            font-style: italic;
            color: #666;
            margin: 2.6em 0 1.6em;
        }

        .preview p {
            text-indent: 2.5em;
            margin: 1.5em 0;
            text-align: justify;
        }

        .preview blockquote {
            background: #f5f0e6;
            border-left: 8px solid var(--accent);
            margin: 3em 3em;
            padding: 28px 36px;
            color: #444;
            border-radius: 4px;
        }

        [data-theme="dark"] .preview blockquote {
            background: #3a342a;
            color: #d4c4a8;
        }

        .preview .chapter-end {
            text-align: center;
            color: var(--primary);
            margin: 4em 0 2.5em;
            font-weight: bold;
            font-size: 1.1em;
        }

        .status {
            margin-top: 10px;
            font-size: 14.5px;
            color: #777;
        }

        .output-area {
            padding: 16px 32px;
            background: #f9f4eb;
            border-top: 1px solid #e8d9c0;
            flex-shrink: 0;
        }

        [data-theme="dark"] .output-area {
            background: #25221c;
            border-top-color: #4a4235;
        }

        #outputHTML {
            width: 100%;
            height: 135px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14.2px;
            background: #f4ede3;
            border: 2px solid #e8d9c0;
            border-radius: 12px;
            padding: 14px;
            resize: vertical;
        }

        [data-theme="dark"] #outputHTML {
            background: #2c2820;
            border-color: #4a4235;
            color: #d4c4a8;
        }
    </style>
</head>
<body data-theme="light">
    <div class="container">
        <header>
            <h1>小说转HTML · 优雅排版</h1>
            <div class="header-right">
                <button onclick="toggleTheme()" class="btn-secondary" title="切换主题">🌙</button>
                <button onclick="convertToHTML()" class="btn-primary">🚀 转换为HTML</button>
                <button onclick="exportFullHTML()" class="btn-secondary">📄 导出完整HTML</button>
                <button onclick="clearAll()" class="btn-secondary">清空</button>
            </div>
        </header>

        <div class="main-content">
            <!-- 输入面板 -->
            <div class="panel">
                <h3>① 粘贴原文</h3>
                <textarea id="input" placeholder="请将小说或文章内容粘贴在这里...&#10;支持章节标题、诗词自动识别"></textarea>
                <div class="status">提示：按 <strong>Ctrl + Enter</strong> 快速转换</div>
            </div>

            <!-- 预览面板 -->
            <div class="panel">
                <h3>② 实时小说排版预览</h3>
                <div id="preview" class="preview"></div>
            </div>
        </div>

        <!-- 输出代码区 -->
        <div class="output-area">
            <h3 style="margin-bottom: 10px; color: var(--primary);">③ 生成的HTML代码</h3>
            <textarea id="outputHTML" readonly placeholder="转换后将在这里显示HTML代码"></textarea>
        </div>
    </div>

    <script>
        // ==================== 工具函数 ====================
        function escapeHTML(str) {
            return str.replace(/&/g, '&amp;')
                      .replace(/</g, '&lt;')
                      .replace(/>/g, '&gt;')
                      .replace(/"/g, '&quot;')
                      .replace(/'/g, '&#039;');
        }

        function isChapterTitle(line) {
            return /^(第[一二三四五六七八九十百千0-9]+[回章卷节集])|第\s*\d+[回章]/.test(line) ||
                   (line.includes('第') && line.includes('回') && line.length < 90);
        }

        function isLikelyPoem(line) {
            const t = line.trim();
            if (t.length > 72 || t.length < 6) return false;
            if (/^(却说|看官|原来|且说|话说|这且不说|按下|却听)/.test(t)) return false;
            const punctCount = (t.match(/[，。？！；、：“”‘’（）]/g) || []).length;
            return punctCount >= 4 || /诗云|偈云|好了歌|对联|绝句|律诗/.test(t);
        }

        // ==================== 核心转换函数（重点优化） ====================
        function convertToHTML() {
            const text = document.getElementById('input').value.trim();
            if (!text) return alert('请先粘贴小说或文章内容！');

            const lines = text.split(/\r?\n/);
            let html = '';
            let i = 0;

            while (i < lines.length) {
                let line = lines[i].trim();
                if (!line) { i++; continue; }

                // 章节标题
                if (isChapterTitle(line)) {
                    html += `<h2>${escapeHTML(line)}</h2>\n`;
                    i++;
                    if (i < lines.length) {
                        let next = lines[i].trim();
                        if (next && !isChapterTitle(next) && next.length < 100) {
                            html += `<h3>${escapeHTML(next)}</h3>\n`;
                            i++;
                        }
                    }
                    continue;
                }

                // 诗词、偈语
                if (isLikelyPoem(line)) {
                    let poem = escapeHTML(line);
                    let count = 1;
                    i++;
                    while (i < lines.length) {
                        let next = lines[i].trim();
                        if (!next || isChapterTitle(next) || next.length > 78) break;
                        if (isLikelyPoem(next)) {
                            poem += '<br>' + escapeHTML(next);
                            count++;
                            i++;
                        } else break;
                    }
                    html += (count >= 2 || poem.includes('好了歌')) 
                        ? `<blockquote>${poem}</blockquote>\n` 
                        : `<p>${poem}</p>\n`;
                    continue;
                }

                // 特殊叙述句
                if (/^(却说|看官|原来|且说|话说|这且不说)/.test(line)) {
                    html += `<p><strong>${escapeHTML(line)}</strong></p>\n`;
                    i++;
                    continue;
                }

                // ==================== 改进后的段落合并逻辑 ====================
                let paragraph = line;
                i++;

                while (i < lines.length) {
                    let next = lines[i].trim();
                    if (!next) { i++; continue; }

                    if (isChapterTitle(next) || isLikelyPoem(next) || 
                        /^(却说|看官|原来|且说|话说|这且不说)/.test(next)) {
                        break;
                    }

                    const currEndsWithPunct = /[。！？；]$/.test(paragraph);
                    const nextStartsWithPunct = /^[，。！？；、]/.test(next);
                    const nextIsShort = next.length < 32;
                    const currIsLong = paragraph.length > 105;

                    // 明显接续的标点 → 合并
                    if (nextStartsWithPunct) {
                        paragraph += ' ' + next;
                        i++;
                        continue;
                    }

                    // 当前已完整 + （很长 或 下一句极短独立句）→ 断开
                    if (currEndsWithPunct && (currIsLong || nextIsShort)) {
                        break;
                    }

                    paragraph += ' ' + next;
                    i++;
                }

                html += `<p>${escapeHTML(paragraph)}</p>\n`;
            }

            // 本章完
            if (/本章完|（本章完）|\(本章完\)/.test(text)) {
                html += '<div class="chapter-end">（本章完）</div>';
            }

            document.getElementById('preview').innerHTML = html;
            document.getElementById('outputHTML').value = html.trim();
        }

        // 导出完整HTML
        function exportFullHTML() {
            const content = document.getElementById('preview').innerHTML;
            if (!content) return alert('请先进行转换！');

            const fullHTML = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>小说 · 优雅阅读版</title>
    <style>
        body { font-family: "Songti SC", "Noto Serif SC", serif; background:#f9f6f0; padding:70px 80px; line-height:2.08; font-size:18px; max-width:860px; margin:40px auto; color:#2c2c2c; }
        h2 { text-align:center; color:#8b5a2b; border-bottom:3px double #d4a373; padding-bottom:20px; margin:80px 0 40px; }
        h3 { text-align:center; font-style:italic; color:#555; margin:60px 0 35px; }
        p { text-indent:2.6em; margin:1.65em 0; text-align:justify; }
        blockquote { background:#f5f0e6; border-left:8px solid #d4a373; margin:50px 40px; padding:34px 40px; border-radius:4px; }
        .chapter-end { text-align:center; color:#8b5a2b; margin:100px 0 60px; font-size:1.15em; }
    </style>
</head>
<body>${content}</body>
</html>`;

            const blob = new Blob([fullHTML], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = '小说阅读版.html';
            a.click();
        }

        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('preview').innerHTML = '';
            document.getElementById('outputHTML').value = '';
        }

        function toggleTheme() {
            const body = document.body;
            const current = body.getAttribute('data-theme');
            body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        }

        // 快捷键
        document.getElementById('input').addEventListener('keydown', e => {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                convertToHTML();
            }
        });

        // 页面加载完成后自动聚焦输入框
        window.onload = () => {
            document.getElementById('input').focus();
        };
    </script>
</body>
</html>
