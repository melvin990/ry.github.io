name: STASH-RULES 规则集覆写
desc: STASH-RULES 2026-6 优化精简版

rule-providers:
  applications:
    behavior: domain
    format: yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/applications.txt
    interval: 86400
  reject:
    behavior: domain
    format: yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt
    interval: 86400
  icloud:
    behavior: domain
    format: yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/icloud.txt
    interval: 86400
  apple:
    behavior: domain
    format: yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/apple.txt
    interval: 86400
  google:
    behavior: domain
    format: yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/google.txt
    interval: 86400
  proxy:
    behavior: domain
    format: yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt
    interval: 86400
  direct:
    behavior: domain
    format: yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt
    interval: 86400
  private:
    behavior: domain
    format: yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/private.txt
    interval: 86400
  gfw:
    behavior: domain
    format: yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/gfw.txt
    interval: 86400
  telegramcidr:
    behavior: ipcidr
    format: yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/telegramcidr.txt
    interval: 86400
  cncidr:
    behavior: ipcidr
    format: yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/cncidr.txt
    interval: 86400
  lancidr:
    behavior: ipcidr
    format: yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/lancidr.txt
    interval: 86400
  tldnotcn:
    behavior: ipcidr
    format: yaml
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/tld-not-cn.txt
    interval: 86400

ules: #!replace
  # ==================== 最高优先级 ====================
  - RULE-SET,reject,🛑全球拦截                    # 广告拦截尽量靠前

  - DOMAIN,clash.razord.top,🧱国内网址,no-resolve
  - DOMAIN,yacd.haishan.me,🧱国内网址,no-resolve

  # 自定义高优先规则（保持你原来的）
  - GEOSITE,category-ai-!cn,֎谷歌-AI
  - GEOSITE,google-play,֎谷歌-AI
  - DOMAIN-SUFFIX,crisp.chat,֎谷歌-AI
  - DOMAIN-KEYWORD,v2free.org,֎谷歌-AI

  - GEOSITE,youtube,▷油管视频
  - GEOSITE,google,֎谷歌-AI
  - GEOSITE,twitter,🌍国外媒体
  - GEOSITE,github,🌍国外媒体
  - DOMAIN-SUFFIX,sagepub.com,🌍国外媒体

  # ==================== 私有 & 局域网（非常重要）================
  - RULE-SET,private,🎯不用代理,no-resolve
  - GEOIP,private,🎯不用代理,no-resolve
  - GEOIP,LAN,🎯不用代理,no-resolve

  - IP-CIDR,192.168.0.0/16,🎯不用代理,no-resolve
  - IP-CIDR,10.0.0.0/8,🎯不用代理,no-resolve
  - IP-CIDR,172.16.0.0/12,🎯不用代理,no-resolve

  # ==================== 苹果服务 ====================
  - RULE-SET,icloud,🍎苹果服务
  - RULE-SET,apple,🍎苹果服务,no-resolve

  # ==================== 国内直连 ====================
  - GEOSITE,microsoft@cn,🧱国内网址
  - GEOSITE,apple-cn,🧱国内网址
  - GEOSITE,steam@cn,🧱国内网址
  - GEOSITE,category-games@cn,🧱国内网址
  - GEOSITE,xiaohongshu,🧱国内网址
  - GEOSITE,CN,🧱国内网址
  - DOMAIN-SUFFIX,cn,🧱国内网址

  - GEOSITE,microsoft,Ⓜ️微软服务
  - RULE-SET,applications,🎯不用代理
  - RULE-SET,direct,🎯不用代理

  # ==================== 国外媒体 ====================
  - RULE-SET,google,🌍国外媒体
  - RULE-SET,proxy,🌍国外媒体
  - RULE-SET,gfw,🌍国外媒体
  - RULE-SET,tldnotcn,🌍国外媒体

  # ==================== 特殊服务 ====================
  - RULE-SET,telegramcidr,📲电报信息,no-resolve
  - RULE-SET,cncidr,🧱国内网址,no-resolve
  - RULE-SET,lancidr,🧱国内网址,no-resolve

  # ==================== 国内 IP（靠后）================
  - GEOIP,CN,🧱国内网址,no-resolve

  # ==================== 兜底 ====================
  - MATCH,🐟境外网站
